appId: app.mockstream.desktop
productName: Mock Stream
directories:
  output: dist
  buildResources: build
# Auto-update feed (electron-updater). The packaged app reads latest.yml + the
# installer from this public GCS bucket; `npm run release` builds and uploads
# them (see AUTOUPDATE.md). A space-free artifact name keeps the download URL clean.
artifactName: MockStream-Setup-${version}.${ext}
publish:
  provider: generic
  url: https://storage.googleapis.com/mockstream-desktop-releases
# Register the mockstream:// custom protocol so the installed app handles the
# Telegram bridge deep-link return (the same scheme the mobile app uses, which
# tg-login.html already allow-lists). On Windows this writes the URL-scheme
# registry keys at install time; on macOS it adds the CFBundleURLTypes entry.
protocols:
  - name: Mock Stream Protocol
    schemes:
      - mockstream
files:
  - out/**/*
# Bundle the runner's static SPA build (mockstream-runner/dist) into the
# packaged app under <resources>/runner. `prepack`/`predist` rebuild it first.
extraResources:
  - from: ../mockstream-runner/dist
    to: runner
    filter:
      - '**/*'
win:
  target: nsis
  # CODE SIGNING (ready, needs your certificate — see SIGNING.md):
  # electron-builder auto-signs the .exe + installer when these env vars are set
  # before `npm run dist`:
  #   set CSC_LINK=C:\path\to\your-cert.pfx
  #   set CSC_KEY_PASSWORD=<pfx password>
  # With a real OV/EV cert from a CA, this removes the SmartScreen "unknown
  # publisher" warning. Without a cert, the build is unsigned (current state).
mac:
  # dmg = user download · zip = what electron-updater needs for macOS auto-update.
  # universal = one build runs on both Intel and Apple-Silicon Macs.
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  category: public.app-category.education
  # Notarization-ready (direct-download / Developer ID — NOT the Mac App Store, so
  # no IAP / 3.1.1 rules apply; code-unlock + purchase flows stay as-is). Signing +
  # notarization run on a macOS GitHub Actions runner (see .github/workflows/release-mac.yml
  # and SIGNING.md). hardenedRuntime + entitlements are required for notarization.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # macOS shows this when the Speaking exam first requests the mic; without it
  # the OS silently denies microphone access (no prompt, no waveform).
  extendInfo:
    NSMicrophoneUsageDescription: Mock Stream needs the microphone to record your spoken answers during Speaking mock exams.
  # notarize:true uses notarytool with APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID from the CI env. The Developer ID Application cert comes from
  # CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD.
  notarize: true
