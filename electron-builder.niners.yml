# Niners Academy — white-label desktop build config.
# ----------------------------------------------------------------------------
# Used via `electron-builder --config electron-builder.niners.yml` AFTER the
# runner is built with VITE_CENTER_ID=niners and the main bundle with
# FLAVOR=niners (see the dist:niners npm script). Mirrors electron-builder.yml
# but with Niners Academy identity, its own icon, deep-link scheme, and its
# OWN release bucket so niners and Mock Stream auto-updates never cross.
appId: app.mockstream.niners.desktop
productName: Niners Academy
directories:
  output: dist
  buildResources: build
artifactName: NinersAcademy-Setup-${version}.${ext}
publish:
  provider: generic
  url: https://storage.googleapis.com/niners-desktop-releases
# niners' OWN custom protocol (matches the mobile niners scheme) for the
# Telegram bridge deep-link return — never collides with Mock Stream's
# `mockstream://`.
protocols:
  - name: Niners Academy Protocol
    schemes:
      - mockstreamniners
files:
  - out/**/*
# Bundle the niners-flavored runner build (built with VITE_CENTER_ID=niners).
extraResources:
  - from: ../mockstream-runner/dist
    to: runner
    filter:
      - '**/*'
win:
  target: nsis
  icon: build/niners/icon.png
mac:
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  category: public.app-category.education
  icon: build/niners/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Mic prompt for the Speaking exam (else macOS silently denies the mic).
  extendInfo:
    NSMicrophoneUsageDescription: Niners Academy needs the microphone to record your spoken answers during Speaking mock exams.
  notarize: true
