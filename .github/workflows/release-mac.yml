# Build, sign, notarize & publish the macOS desktop app.
# ----------------------------------------------------------------------------
# Runs on a macOS runner (codesign + notarytool are macOS-only, so this can't
# run on the Windows dev machine). Manual trigger only — it costs macOS CI
# minutes and should run once per release.
#
# It checks out BOTH repos (the desktop shell bundles ../mockstream-runner/dist),
# imports the Developer ID cert, builds a universal dmg + zip, notarizes them,
# then publishes dmg + zip + latest-mac.yml to the GCS release bucket so
# installed apps auto-update.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   MAC_CSC_LINK               base64 of the "Developer ID Application" .p12
#   MAC_CSC_KEY_PASSWORD       the .p12 export password
#   APPLE_ID                   your Apple Developer account email
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password (appleid.apple.com → Sign-In & Security)
#   APPLE_TEAM_ID              10-char Team ID (developer.apple.com → Membership)
#   GCP_SA_KEY                 JSON key of a service account with write access to
#                              gs://mockstream-desktop-releases
#   RUNNER_REPO_TOKEN          PAT (repo:read) to check out mockstream-runner
#                              (only needed while that repo is private)
name: Release (macOS)

on:
  workflow_dispatch:
    inputs:
      notes:
        description: Release notes / reason (optional)
        required: false

jobs:
  build-mac:
    runs-on: macos-14 # Apple Silicon; builds a universal binary for Intel + ARM
    steps:
      - name: Check out desktop
        uses: actions/checkout@v4
        with:
          path: mockstream-desktop

      - name: Check out runner (bundled into the app)
        uses: actions/checkout@v4
        with:
          repository: Davirbek01/mockstream-runner
          token: ${{ secrets.RUNNER_REPO_TOKEN }} # drop this line if the repo is public
          path: mockstream-runner

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install runner deps
        working-directory: mockstream-runner
        run: npm ci

      - name: Install desktop deps
        working-directory: mockstream-desktop
        run: npm ci

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CSC_LINK }}
          p12-password: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: Build, sign & notarize (universal dmg + zip)
        working-directory: mockstream-desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --mac

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish to GCS release bucket
        working-directory: mockstream-desktop
        run: node scripts/upload-release.mjs

      - name: Upload build artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            mockstream-desktop/dist/*.dmg
            mockstream-desktop/dist/*.zip
            mockstream-desktop/dist/latest-mac.yml
          if-no-files-found: ignore
